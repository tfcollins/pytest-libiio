name: CI Pushes

on: [push, pull_request]

jobs:
  Test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          bash ./.github/scripts/install_libiio.sh
          bash ./.github/scripts/install_iioemu.sh
          sudo apt-get install -y python3-pip python3-setuptools
          pip install --upgrade nox uv coveralls

      - name: Test
        run: nox -s "tests-${{ matrix.python-version }}"

      - name: Report coverage
        if: matrix.python-version == '3.9'
        continue-on-error: true
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: coveralls

  Lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          pip install nox uv

      - name: Lint
        run: nox -s lint && nox -s format_check

  Deploy:
    runs-on: ubuntu-latest
    needs: [Test, Lint]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies and generate package
        run: |
          bash ./.github/scripts/install_libiio.sh
          sudo apt-get install -y python3-pip python3-setuptools
          pip install build hatchling
          python -m build --sdist --wheel

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
